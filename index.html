<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/collabify-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Collabify - a project management and collaboration platform built for BSIT students and professors in the Philippines."
    />
    <title>Collabify - Project management for BSIT teams</title>

    <!-- Preconnect and load the Sora typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Apply saved theme before paint to avoid a flash; defaults to light -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("collabify-theme");
          var dark =
            stored === "dark" ||
            (stored === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
